<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#102a43">
    <title>Kasirku - Offline</title>
    <style>
        * { box-sizing: border-box; }
        body { display: grid; min-height: 100dvh; margin: 0; place-items: center; background: #071424; color: #e5edf6; font-family: system-ui, sans-serif; padding: 24px; }
        main { max-width: 420px; text-align: center; }
        b { display: grid; width: 56px; height: 56px; margin: 0 auto 20px; place-items: center; border: 1px solid #f4bf4f; border-radius: 8px; color: #f4bf4f; font-size: 26px; }
        h1 { margin: 0; font-size: 25px; } p { color: #9fb2c5; line-height: 1.6; } button { border: 0; border-radius: 7px; background: #f4bf4f; color: #102a43; cursor: pointer; font-weight: 700; padding: 11px 18px; }
    </style>
</head>
<body><main><b>K</b><h1>Kasirku sedang offline</h1><p>Periksa koneksi internet, lalu coba muat kembali halaman.</p><button onclick="location.reload()">Coba lagi</button></main></body>
</html>
